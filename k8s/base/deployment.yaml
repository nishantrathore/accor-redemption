apiVersion: v1
kind: ServiceAccount
metadata:
  name: redemption-sa
  namespace: redemption
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/redemption-production-redemption-svc"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redemption
  namespace: redemption
  labels:
    app: redemption
    version: "1.0.0"
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: redemption
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0      # zero-downtime: never remove a pod before a new one is Ready
      maxSurge: 2
  template:
    metadata:
      labels:
        app: redemption
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: redemption-sa
      automountServiceAccountToken: true

      # Spread across AZs and nodes for resilience
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: redemption
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: redemption

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [redemption]
              topologyKey: kubernetes.io/hostname

      # Baseline pods go to on-demand nodes; burst pods tolerate Spot
      nodeSelector:
        workload-type: baseline

      terminationGracePeriodSeconds: 60

      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z $(DB_HOST) 5432; do echo waiting for database; sleep 2; done']
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: redemption-db-secret
                  key: host
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

      containers:
        - name: redemption
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com/redemption:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          env:
            - name: APP_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_FORMAT
              value: "json"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: redemption-db-secret
                  key: host
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: redemption-db-secret
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: redemption-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redemption-db-secret
                  key: password
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redemption-redis-secret
                  key: url

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 30
            periodSeconds: 2

          lifecycle:
            preStop:
              exec:
                # Drain in-flight requests before pod exits
                command: ["/bin/sh", "-c", "sleep 5"]

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-config
              mountPath: /app/config
              readOnly: true

      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-config
          configMap:
            name: redemption-config

      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: redemption
  namespace: redemption
  labels:
    app: redemption
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
spec:
  type: ClusterIP
  selector:
    app: redemption
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
