apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: redemption
  namespace: redemption
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: redemption
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
    # Scale on custom requests-per-second metric
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "500"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0   # scale up immediately on spike
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 10
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300 # wait 5 min before scaling down
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60
      selectPolicy: Min
