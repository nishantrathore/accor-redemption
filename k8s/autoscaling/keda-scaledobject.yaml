apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: redemption-sqs-scaler
  namespace: redemption
spec:
  scaleTargetRef:
    name: redemption
  minReplicaCount: 3
  maxReplicaCount: 50
  cooldownPeriod: 300
  pollingInterval: 10
  advanced:
    restoreToOriginalReplicaCount: true
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: keda-sqs-auth
      metadata:
        queueURL: "https://sqs.ap-southeast-1.amazonaws.com/ACCOUNT_ID/redemption-jobs"
        queueLength: "10"         # scale 1 pod per 10 messages
        awsRegion: "ap-southeast-1"
        identityOwner: pod        # use IRSA
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-sqs-auth
  namespace: redemption
spec:
  podIdentity:
    provider: aws
